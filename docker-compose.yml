name: ton-marketplace

services:

  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ton-service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ton-service}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-ton-service}
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: "http://localhost:3001,${TUNNEL_URL:-http://localhost:3001}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      JWT_EXPIRATION: 7d
      TON_NETWORK: testnet
      TON_API_KEY: "${TON_API_KEY:-}"
      TON_ADMIN_WALLET_MNEMONIC: "${TON_ADMIN_WALLET_MNEMONIC:-}"
      MAIL_HOST: "${MAIL_HOST:-localhost}"
      MAIL_PORT: "${MAIL_PORT:-1025}"
      MAIL_USER: "${MAIL_USER:-test@example.com}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-password}"
      MAIL_FROM: "${MAIL_FROM:-Marketplace <noreply@marketplace.com>}"
      RATE_LIMIT_TTL: 60
      RATE_LIMIT_MAX: 100
      AUTH_RATE_LIMIT_TTL: 900
      AUTH_RATE_LIMIT_MAX: 5
      CSRF_ENABLED: "false"
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 5242880
      MAX_FILES: 10
      ALLOWED_MIME_TYPES: image/jpeg,image/png,image/webp
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
      - backend_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - path: ./.env
        required: false
    environment:
      PORT: 3001
      TUNNEL_URL: "${TUNNEL_URL:-}"
      NEXT_PUBLIC_TON_NETWORK: testnet
      NEXT_PUBLIC_DEFAULT_LOCALE: ru
      API_INTERNAL_URL: "http://backend:3000/api"
      BACKEND_INTERNAL_URL: "http://backend:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --url http://frontend:3001 --no-autoupdate
    depends_on:
      - frontend

volumes:
  postgres_data:
  backend_modules:
  frontend_modules:
  frontend_next:
